version: '3.8'

services:
  postgres:
    image: timescale/timescaledb-ha:pg16
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=mymind
      - POSTGRES_PASSWORD=mymind_secret
      - POSTGRES_DB=mymind
    volumes:
      - postgres_data:/home/postgres/pgdata/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
